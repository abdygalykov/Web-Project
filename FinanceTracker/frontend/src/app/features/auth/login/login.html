<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">💳</span>
      <h1>FinanceTracker</h1>
      <p>Log in</p>
    </div>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username"
        (keyup.enter)="submit()"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        (keyup.enter)="submit()"
      />
    </div>

    <button class="btn btn-primary btn-full" (click)="submit()">Log in</button>

    <p class="auth-footer">
      Нет аккаунта? <a routerLink="/register">Register</a>
    </p>

    <p class="demo-hint">Demo-login: Login <strong>demo</strong>, any password</p>
  </div>
</div>
